        <div class="form">
            <h1>Formulario de inscripción</h1>
        <label for="nombre">Digite sus nombres y apellidos: </label>
            <input type="text" class="form-control mb-3" id="nombre" placeholder="Ej: Juan Pérez">

        <label for="apellidos">Digite referencia de la moto</label>
            <input type="text" class="form-control mb-3" id="nombre" placeholder="Ej: AKT TT 250">

        <label for="cedula">Digite su número de identificación</label>
            <input type="text" class="form-control mb-3" id="nombre" placeholder="Ej: 1.012.333.665">
        
        <label for="genero">Seleccione su género</label>
        <select name="genero" id="">
            <option value="Hombre">Hombre</option>
            <option value="mujer">Mujer</option>
            <option value="no definido">No definido</option>
            <option value="no sabe">No sabe, no responde</option>
        </select><br>

        <label class="mb-3" for="mensaje"></label>
        <textarea class="form-control mb-3" rows="3" placeholder="¿Cómo te enteraste del proyecto?"></textarea>
        <br>

        <label for="enviar"></label><br>
        <div class="d-flex justify-content-between">
        <button class="btn btn-success px-4">Enviar</button>
        <button class="btn btn-outline-danger px-4">Cancelar</button>
