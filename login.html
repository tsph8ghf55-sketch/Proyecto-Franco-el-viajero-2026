<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Franco el Viajero</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-dark navbar-dark px-4 animate__animated animate__fadeInDown">
    <a class="navbar-brand d-flex align-items-center" href="inicio.html">
      <img src="IMG/logo.png.jpg" alt="Logo" height="50" class="me-2">
      <span class="fs-4">Franco el Viajero</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="menuNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="inicio.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="formulario.html">Inscripción por</a></li>
        <li class="nav-item"><a class="nav-link" href="tienda.html">Tienda</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>


  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 login-container text-center">
      <img src="IMG/logo.png.jpg" alt="Franco el Viajero Logo" class="brand-logo rounded-circle">
      <h2 class="login-title mb-4">Franco el Viajero</h2>
      <form onsubmit="return login(event)">
        <div class="mb-3 text-start">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="email" placeholder="viajero@email.com" required>
        </div>
        <div class="mb-3 text-start">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <div class="d-grid gap-2 mt-4">
          <button type="submit" class="btn btn-primary btn-lg">Iniciar sesión</button>
        </div>
        <div class="mt-3">
          <a href="#" class="text-decoration-none text-secondary">¿Olvidaste tu contraseña?</a>
        </div>
      </form>
    </div>
  </div>

  
  <footer class="bg-dark text-white text-center py-4">
    <div class="container">
      <h4 id="redes">Síguenos en nuestras redes sociales</h4>
      <div class="d-flex justify-content-center my-3 gap-4">
        <a href="https://www.tiktok.com/@franco_el_viajero" target="_blank" class="text-white fs-4" aria-label="TikTok">
          <i class="fab fa-tiktok"></i>
        </a>
        <a href="https://www.facebook.com/norbey.valenciafranco" target="_blank" class="text-white fs-4" aria-label="Facebook">
          <i class="fab fa-facebook-f"></i>
        </a>
        <a href="https://www.instagram.com/franco_el_viajero" target="_blank" class="text-white fs-4" aria-label="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="https://youtube.com/@franco_el_viajero" target="_blank" class="text-white fs-4" aria-label="YouTube">
          <i class="fab fa-youtube"></i>
        </a>
      </div>
      <p class="mb-0">&copy; 2025 Franco el Viajero. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script>
    function login(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (email && password) {
        window.location.href = 'dash.html'; //
      } else {
        alert('Por favor completa todos los campos.');
      }
    }
  </script>

  <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</body>
</html>
